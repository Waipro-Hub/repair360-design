<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MrPhone — Repair360</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          mr: { DEFAULT: '#DC2626', dark: '#B91C1C', darker: '#991B1B', light: '#FEE2E2', tint: '#FEF2F2' },
          ink: { DEFAULT: '#0F172A', soft: '#334155', mute: '#64748B', faint: '#94A3B8' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      },
    },
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #E2E8F0;
    color: #0F172A;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .rs-app { font-family: 'Inter', system-ui, sans-serif; }
  ::selection { background: #FECACA; }

  /* ---- Vodafone-style GIANT buttons ---- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; min-height: 60px; padding: 0 24px;
    border-radius: 18px; border: none; cursor: pointer;
    font-family: inherit; font-weight: 800; font-size: 18px; line-height: 1;
    letter-spacing: -0.01em; transition: transform .12s ease, background-color .15s ease, box-shadow .15s ease;
    user-select: none;
  }
  .btn:active { transform: scale(0.975); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .btn-primary { background: #DC2626; color: #fff; box-shadow: 0 10px 24px -8px rgba(220,38,38,.55); }
  .btn-primary:not(:disabled):hover { background: #B91C1C; }
  .btn-dark { background: #0F172A; color: #fff; box-shadow: 0 10px 24px -10px rgba(15,23,42,.55); }
  .btn-dark:not(:disabled):hover { background: #1E293B; }
  .btn-ghost { background: #fff; color: #0F172A; border: 2px solid #E2E8F0; min-height: 56px; box-shadow: none; }
  .btn-ghost:not(:disabled):hover { border-color: #CBD5E1; background: #F8FAFC; }
  .btn-soft { background: #FEF2F2; color: #DC2626; border: 2px solid #FECACA; min-height: 54px; box-shadow: none; }
  .btn-soft:not(:disabled):hover { background: #FEE2E2; }

  /* ---- Form inputs ---- */
  .form-input {
    width: 100%; min-height: 56px; padding: 0 18px;
    border-radius: 16px; border: 2px solid #E2E8F0; background: #fff;
    font-family: inherit; font-size: 17px; font-weight: 600; color: #0F172A;
    outline: none; transition: border-color .15s ease, box-shadow .15s ease;
  }
  .form-input::placeholder { color: #94A3B8; font-weight: 500; }
  .form-input:focus { border-color: #DC2626; box-shadow: 0 0 0 4px #FEE2E2; }
  textarea.form-input { min-height: 96px; padding: 14px 18px; resize: none; line-height: 1.5; }

  .card { background: #fff; border: 1px solid #EEF2F6; border-radius: 22px; }
  .label-xs { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: #94A3B8; }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  @keyframes rs-pop { from { transform: translateY(10px); } to { transform: none; } }
  .rs-pop { animation: rs-pop .28s cubic-bezier(.16,1,.3,1) both; }
  @keyframes rs-slidein { from { transform: translateX(24px);} to { transform:none;} }
  .rs-slidein { animation: rs-slidein .3s cubic-bezier(.16,1,.3,1) both; }
  @keyframes rs-ping { 0%{transform:scale(1);opacity:.7} 75%,100%{transform:scale(2.2);opacity:0} }
  .rs-ping { animation: rs-ping 1.6s cubic-bezier(0,0,.2,1) infinite; }
  @keyframes rs-flip { 0%{transform:rotateX(70deg)} 100%{transform:rotateX(0)} }
  .rs-flip { animation: rs-flip .5s ease both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="screens-auth-home.jsx"></script>
<script type="text/babel" src="screens-wizard.jsx"></script>
<script type="text/babel" src="screens-extra.jsx"></script>
<script type="text/babel" src="screens-ticket-queue.jsx"></script>
<script type="text/babel" src="screens-team.jsx"></script>
<script type="text/babel" src="chat-marco.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
