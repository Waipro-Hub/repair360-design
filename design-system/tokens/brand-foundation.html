<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="it" data-brand="riparasubito">
<head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{padding:28px;background:#fafafa}
  h1{font-size:var(--text-2xl);font-weight:var(--font-black);margin:0 0 4px}
  .sub{color:var(--muted);margin:0 0 22px}
  .brands{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:26px}
  .b{border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--line);background:#fff}
  .b .top{height:64px;display:flex;align-items:center;padding:0 16px;color:#fff;font-weight:var(--font-black)}
  .b .body{padding:14px 16px}
  .sw{display:flex;gap:8px;margin-top:8px}
  .sw span{width:28px;height:28px;border-radius:8px;border:1px solid rgba(0,0,0,.08)}
  .demo{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:10px}
  .scale{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .scale b{font-weight:var(--font-black)}
</style></head>
<body>
  <h1>WAIPRO · Repair360 — Fondazione brand</h1>
  <p class="sub">Un design system, tre brand. Cambia con <code>data-brand</code>. Aggiungere un tenant = un nuovo blocco brand.</p>

  <div class="brands">
    <div class="b" data-brand="riparasubito">
      <div class="top" style="background:var(--brand)">RiparaSubito</div>
      <div class="body"><span class="rd-pill">arancio · stile Vodafone</span>
        <div class="sw"><span style="background:#FF6B00"></span><span style="background:#fff7ed"></span><span style="background:#e25e00"></span></div>
      </div>
    </div>
    <div class="b" data-brand="mrphone">
      <div class="top" style="background:var(--brand)">MrPhone</div>
      <div class="body"><span class="rd-pill">rosso · app tema CHIARO</span>
        <div class="sw"><span style="background:#DC2626"></span><span style="background:#fef2f2"></span><span style="background:#b91c1c"></span></div>
      </div>
    </div>
    <div class="b" data-brand="tec">
      <div class="top" style="background:var(--brand)">TEC Perugia</div>
      <div class="body"><span class="rd-pill">multiservizi · blu</span>
        <div class="sw"><span style="background:#0F4C81"></span><span style="background:#eef4fb"></span><span style="background:#0c3c66"></span></div>
      </div>
    </div>
  </div>

  <div class="rd-card" data-brand="riparasubito">
    <div class="scale">
      <span style="font-size:var(--text-4xl)"><b>Aa</b></span>
      <span style="font-size:var(--text-2xl);font-weight:var(--font-bold)">Inter</span>
      <span style="color:var(--muted)">400 · 500 · 600 · 700 · 900</span>
    </div>
    <div class="demo">
      <button class="rd-btn">Prenota riparazione</button>
      <button class="rd-btn rd-btn--ghost">Scopri di più</button>
      <span class="rd-pill">diagnosi gratuita</span>
    </div>
  </div>
</body>
</html>
